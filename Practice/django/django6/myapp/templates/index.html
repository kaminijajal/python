<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create User</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow">
                <div class="card-header text-center fw-bold">
                      {% if std %}
            Update User
        {% else %}
            Create User
        {% endif %}
                </div>

                <div class="card-body">
                     {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}

                    <form action="{%url 'add'%}" method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <!-- ID -->
                        <div class="mb-3">
                            
                            <input type="hidden" name="id" value="{{std.id}}" class="form-control" readonly>
                        </div>

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" value="{{std.name}}" class="form-control" placeholder="Enter name">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" value="{{std.email}}" class="form-control" placeholder="Enter email">
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text" name="phone" value="{{std.phone}}" class="form-control" placeholder="Enter phone number">
                        </div>

                        <!-- Age -->
                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" name="age" value="{{std.age}}" class="form-control" placeholder="Enter age">
                        </div>

                        <!-- Image -->
                        {% if std and std.image %}
                            <div class="mb-3">
                                <img src="{{ std.image.url }}" height="100" width="100">
                            </div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label">Image</label>
                            <input type="file" name="image" value="{{std.image}}" class="form-control" multiple>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid mb-2">
                            <button type="submit" class="btn btn-primary">
                            {% if std %} Update {% else %} Create {% endif %}
                            </button>
                        </div>

                        <!-- View All Data Button -->
                        <div class="d-grid">
                            <a href="{%url 'view'%}" class="btn btn-outline-success">
                                View All Data
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
