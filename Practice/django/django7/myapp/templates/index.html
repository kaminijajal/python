<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Form</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <h4 class="mb-0">
                {%if cat%}
                Update Category
                {%else%}
                Add Category
                {%endif%}
            </h4>
          </div>
            {% if messages %}
                <div class="container mt-3">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
    
                    </div>
                    {% endfor %}
                </div>
            {% endif %}
          <div class="card-body">
            <form action="{%url 'insert'%}" method="post" enctype="multipart/form-data">
              {% csrf_token %}
                <!-- Category Name -->
                 <div class="mb-3">
                    <input type="hidden" name="id" value="{{cat.id}}">
                 </div>
              <div class="mb-3">
                <label for="categoryName" class="form-label">Category Name</label>
                <input type="text" name="name" value="{{cat.name}}" class="form-control" id="categoryName" placeholder="Enter category name">
              </div>
              <div class="mb-3">
                {%if cat and cat.image%}
                <img src="media/{{cat.image}}" height="100" width="100" alt="media/{{cat.image}}" srcset="">
                {%endif%}
              </div>
              <!-- Category Image -->
              <div class="mb-3">
                
                <label for="categoryImage" class="form-label">Category Image</label><br>
                <input class="form-control" name="image" type="file" id="categoryImage" accept="image/*">
              </div>

              <!-- Submit Button -->
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-success">Submit</button>
              </div>
            </form>
          </div>
          <div class="card-footer text-center">
            <!-- View All Categories Button -->
            <a href="{%url 'view'%}" class="btn btn-outline-primary">View All Categories</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
