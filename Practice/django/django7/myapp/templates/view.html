<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Categories</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container my-5">

    <h3 class="mb-4 text-center">All Categories</h3>
    {% if messages %}
                <div class="container mt-3">
                    {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                </div>
            {% endif %}
    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle text-center">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Category Name</th>
            <th>Image</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
        {%for cat in cats%}
          <tr>
            <td>{{cat.id}}</td>
            <td>{{cat.name}}</td>
            <td><img src="media/{{cat.image}}" height="70px" width="70px" alt="media/{{cat.image}}" class="img-thumbnail"></td>
            <td>
              <a href="{%url 'update'%}?cid={{cat.id}}" class="btn btn-sm btn-primary me-1">Edit</a>
              <a href="{%url 'delete'%}?cid={{cat.id}}" class="btn btn-sm btn-danger">Delete</a>
            </td>
          </tr>
          {%endfor%}
          
          <!-- Add more static rows here -->
        </tbody>
      </table>
    </div>

    <!-- Back to Insert Button -->
    <div class="text-center mt-4">
      <a href="{%url 'index'%}" class="btn btn-success">Back to Category Insert</a>
    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
