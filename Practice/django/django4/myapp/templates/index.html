<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg rounded-4">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Student Registration</h4>
                </div>

                <div class="card-body">
                     {% if pro%}
                        <h4 class="text-center mb-3">Update Student Data</h4>
                        {%else%}
                        <h4 class="text-center mb-3">Add Student Data</h4>
                        {%endif%}
                        {% if msg %}
                        <div class="alert alert-info text-center">
                            {{ msg }}
                        </div>
                        {% endif %}
                    <form action="{%url 'reg'%}" method="POST" enctype="multipart/form-data">
                   {% csrf_token %}
                        <!-- Name -->
                         <div class="mb3">
                            <input type="text" name="id" value="{{std.id}}">
                         </div>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text"id="name" name="name"value="{{std.name}}" class="form-control" placeholder="Enter name">
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email"id="" name="email"value="{{std.email}}" class="form-control" placeholder="Enter email">
                        </div>

                        <!-- Phone -->
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel"id="phone" name="phone" value="{{std.phone}}"  class="form-control" placeholder="Enter phone">
                        </div>

                        <!-- Age -->
                        <div class="mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" id="age" name="age" value="{{std.age}}" class="form-control" placeholder="Enter age">
                        </div>

                        <!-- Image -->
                        <div class="mb-4">
                            <label class="form-label">Profile Image</label>
                            <input type="file" id="image" name="image" value="{{std.image}}" class="form-control">
                        </div>

                        <!-- Submit -->
                        <button type="submit" class="btn btn-success w-100">
                            Submit
                        </button>

                    </form>
                    
                </div>
                 <div class="text-end">
                    <a href="{%url 'display'%}" class="btn btn-success">View All Students data</a>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
