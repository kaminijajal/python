<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Table</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h3 class="text-center mb-4">Student List</h3>

    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle text-center">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Age</th>
                    <th>Image</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <!-- Row 1 -->
                 {%for std in students%}
                <tr>
                    <td>{{std.id}}</td>
                    <td>{{std.name}}</td>
                    <td>{{std.email}}</td>
                    <td>{{std.phone}}</td>
                    <td>{{std.age}}</td>
                    <td>
                        <img src="media/{{std.image}}" class="rounded" alt="{{std.imagde}}" width="50px" height="50px">
                    </td>
                    <td>
                        <a href="{%url 'update'%}?sid={{std.id}}" class="btn btn-sm btn-primary">Edit</a>
                        <a href="{%url 'delete'%}?sid={{std.id}}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
                {%endfor%}
                

               
            </tbody>
        </table>
        <div class="text-end">
            <a href="{%url 'index'%}" class="btn btn-success">Add New Student</a>
        </div>
    </div>
</div>

</body>
</html>
