<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Table</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h1 class="text-center mb-4">Product List</h1>
    {% if messages %}
    {% for msg in messages %}
        <div class="alert alert-success alert-dismissible fade show">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
    {% endfor %}
{% endif %}


    <div class="table-responsive">
        <table class="table table-bordered table-striped table-hover align-middle text-center bg-white">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Product Name</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Image</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for pro in product %}
                <tr>
                    <td>{{ pro.id }}</td>
                    <td>{{ pro.name }}</td>
                    <td>{{ pro.price }}</td>
                    <td>{{ pro.qty }}</td>
                    <td>
                        <img src="media/{{ pro.image }}"
                             class="img-thumbnail"
                             style="width:70px;height:60px;object-fit:cover;"
                             alt="">
                    </td>
                    <td>
                        <a href="{%url 'update'%}?pid={{ pro.id }}" class="btn btn-success btn-sm me-1">
                            Edit
                        </a>
                        <a href="{%url 'delete'%}?pid={{pro.id}}" class="btn btn-danger btn-sm">
                            Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="text-center mt-4">
        <a href="{%url 'index'%}" class="btn btn-primary px-4">
            ← Back to Index
        </a>
    </div>

</div>

</body>
</html>
