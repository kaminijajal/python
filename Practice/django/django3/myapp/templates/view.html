<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .table img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
        }

        .btn-action {
            min-width: 70px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="card p-4">
        <h4 class="text-center mb-4 text-primary">Product List</h4>

        <table class="table table-bordered align-middle text-center">
            <thead class="table-primary">
                <tr>
                    <th>Id</th>
                    <th>Image</th>
                    <th>Product Name</th>
                    <th>Description</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {%for pro in products %}
                <tr>
                    <td>{{pro.id}}</td>
                    <td><img src="media/{{pro.image}}" alt="{{pro.image}}"></td>
                    <td>{{pro.name}}</td>
                    <td>{{pro.description}}</td>
                    <td>₹{{pro.price}}</td>
                    <td>
                        <a href="{%url 'update'%}?pid={{pro.id}}" class="btn btn-warning btn-sm btn-action">Edit</a>
                        <a href="{%url 'delete'%}?pid={{pro.id}}" class="btn btn-danger btn-sm btn-action">Delete</a>
                    </td>
                </tr>
                {%endfor%}
                
            </tbody>
        </table>

        <div class="text-end">
            <a href="{%url 'addproduct'%}" class="btn btn-success">Add New Product</a>
        </div>
    </div>
</div>

</body>
</html>
