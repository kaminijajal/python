<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-10 mx-auto card p-2 mt-3">
                <h2 align="center"><u>Students Details</u></h2>
                <hr>
                <table class="table">
                    <tr>
                        <th>Id</th>
                        <th>Image</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Age</th>
                        <th colspan="2" class="text-center">Action</th>
                    </tr>
                    {%for std in students%}
                        <tr>
                            <td>{{std.id}}</td>
                            <td><img src="media/{{std.image}}" alt="media/{{std.image}}" height="50px" width="50px"></td>
                            <td>{{std.name}}</td>
                            <td>{{std.email}}</td>
                            <td>{{std.phone}}</td>
                            <td>{{std.age}}</td>
                            <td><a href="{%url 'update'%}?sid={{std.id}}" class="btn btn-primary">Update</a></td>
                            <td><a href="{%url 'delete'%}?sid={{std.id}}" class="btn btn-danger">Delete</a></td>
                        </tr>
                    {%endfor%}
                </table>
                <a href="{%url 'index'%}" class="btn btn-success">Back to Registration</a>
            </div>
        </div>
    </div>
    <!-- {{students}} -->
</body>
</html>
