<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-5 mx-auto">

      
            <h2 ><u>Registration From</u></h2>
            <span class="text-success">{{msg}}</span>
            <form action="{%url 'reg'%}" method="post" enctype="multipart/form-data">
                {%csrf_token%}
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter Name" class="form-control">
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="text" id="email" name="email" placeholder="Enter Email" class="form-control">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" id="phone" name="phone" placeholder="Enter Phone" class="form-control">
                </div>

               
                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="text" id="age" name="age" placeholder="Enter age" class="form-control">
                </div>
                
                <div class="form-group">
                    <label for="img">Image</label>
                    
                    <input type="file" id="img" name="img"  class="form-control">
                </div>

                <div class="form-group">
                    <br>
                    <button type="submit" class="btn btn-success">Submit</button>
                    <button type="reset" class="btn btn-primary">reset</button>
                    <a href="{%url 'display'%}">View ALL Students</a>
                </div>
            </form>

          </div>
        </div>        
    </div>
</body>
</html>
