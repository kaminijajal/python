<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        table, th, td {
            border: 1px solid #ddd;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 5px;
        }

        .action-btn {
            padding: 5px 8px;
            margin: 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: white;
        }

        .edit { background-color: #2196F3; }
        .delete { background-color: #f44336; }
    </style>


</head>
<body>
    <h2>User Records</h2>
    <!-- {{students}} -->
    <table>
        <tr>
            <th>id</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Age</th>
            <th>Image</th>
            <th>Action</th>
        </tr>
        
       
        <!-- Example Row -->
         {%for emp in employees%}
        <tr>
            <td>{{emp.id}}</td>
            <td>{{emp.name}}</td>
            <td>{{emp.email}}</td>
            <td>{{emp.phone}}</td>
            <td>{{emp.age}}</td>
            <td><img src="media/{{emp.image}}" alt="{{emp.image}}" height="40px" width="40px"></td>
            <td>
                <button  class="action-btn edit"><a href="{%url 'edit'%}?eid={{emp.id}}">Edit</a></button>
                <button class="action-btn delete" ><a href="{%url 'delete'%}?eid={{emp.id}}">Delete</a></button>
            </td>
        </tr>
         {%endfor%}
    </table>
    <BUtton><a href="{% url 'reg'%}">Back</a></BUtton>
</body>
</html>
