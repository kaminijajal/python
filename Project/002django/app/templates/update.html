<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: white;
            padding: 25px 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 320px;
        }

        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 18px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Upadte data</h2>
        <span style="color: rgb(106, 243, 106); font-weight: bold;">{{msg}}</span>

        <form action="{%url 'update'%}" method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <input type="hidden" value="{{employees.id}}" name="eid">

            <label for="name">Name</label>
            <input type="text" id="name" name="name" value="{{employees.name}}" placeholder="Enter your name" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{employees.email}}" placeholder="Enter your email" required>

            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" value="{{employees.phone}}" placeholder="Enter your phone number" required>

            <label for="age">Age</label>
            <input type="number" id="age" name="age" value="{{employees.age}}" placeholder="Enter your age" min="1" required>

            <label for="image">Upload Image</label>
            <input type="file" id="image" name="image" required>


            <button type="submit">Submit</button>
            <a href="{% url 'display'%}">View All Employee</a>
        </form>
    </div>

</body>
</html>
