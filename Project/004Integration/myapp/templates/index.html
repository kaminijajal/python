<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        .email-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #7f5eff, #61dafb);
            font-family: 'Poppins', sans-serif;
            padding: 20px;
        }

        .email-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            padding: 35px 40px;
            width: 100%;
            max-width: 550px;
            transition: all 0.3s ease;
        }

        .email-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
        }

        .email-card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 18px;
        }

        .input-group label {
            font-weight: 500;
            margin-bottom: 6px;
            color: #444;
        }

        .input-group input,
        .input-group textarea {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #7f5eff;
            box-shadow: 0 0 0 3px rgba(127, 94, 255, 0.15);
        }

        .file-upload input[type="file"] {
            border: none;
            font-size: 13px;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .send-btn,
        .reset-btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .send-btn {
            background: linear-gradient(135deg, #7f5eff, #5e9dff);
            color: #fff;
            margin-right: 10px;
        }

        .send-btn:hover {
            background: linear-gradient(135deg, #6a48ff, #4c8aff);
        }

        .reset-btn {
            background: #f1f1f1;
            color: #555;
        }

        .reset-btn:hover {
            background: #e3e3e3;
        }

        @media (max-width: 600px) {
            .email-card {
                padding: 25px 20px;
            }

            .button-group {
                flex-direction: column;
            }

            .send-btn,
            .reset-btn {
                width: 100%;
                margin: 6px 0;
            }
        }
    </style>

</head>

<button id="rzp-button1">Pay ₹500 with Razorpay</button>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
document.getElementById('rzp-button1').onclick = function(e){
    e.preventDefault();

    $.get('/payment', {}, function(order){
        var options = {
            "key": "rzp_test_RZXKBwmotI55aB",
            "amount": order.amount,
            "currency": "INR",
            "name": "Shree",
            "description": "Test Transaction",
            "order_id": order.id,
            "handler": function (response){
                alert("Payment ID: " + response.razorpay_payment_id);
                alert("Order ID: " + response.razorpay_order_id);
                alert("Signature: " + response.razorpay_signature);
            },
            "prefill": {
                "name": "Gaurav Kumar",
                "email": "gaurav.kumar@example.com",
                "contact": "6351527744"
            },
            "theme": {
                "color": "#3399cc"
            }
        };

        var rzp1 = new Razorpay(options);
        rzp1.open();
    });
}
</script>




         <section class="email-section">
        <div class="email-card">
            <h2>📧 Send an Email</h2>
            <p class="subtitle">Fill in the details below and hit send.</p>
            <span>{{result}}</span>
            <form action="{%url 'email'%}">
                <div class="input-group">
                    <label for="email-to">To</label>
                    <input type="email" id="email-to" name="email-to" placeholder="recipient@example.com" required>
                </div>



                <div class="input-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter subject here..." required>
                </div>

                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Write your message..." rows="5"
                        required></textarea>
                </div>



                <div class="button-group">
                    <button type="submit" class="send-btn">Send Email</button>
                    <button type="reset" class="reset-btn">Clear</button>
                </div>
            </form>
        </div>
    </section>
